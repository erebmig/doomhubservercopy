<!DOCTYPE html>
<html>
<head>
    <title>DOOMHUB | PREMIUM CLONER</title>
    <style>
        :root { --accent: #7c3aed; --bg: #0c0c0e; --panel: #141417; --border: #26262b; --text: #a1a1aa; }
        body { background: var(--bg); color: #e4e4e7; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #000000; border-right: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; }
        .sidebar h1 { color: #fff; font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 40px; font-weight: 800; border-left: 4px solid var(--accent); padding-left: 15px; }
        .nav-link { padding: 12px; border-radius: 6px; margin-bottom: 8px; cursor: pointer; color: var(--text); transition: all 0.2s; font-size: 0.9rem; }
        .nav-link.active { background: var(--panel); color: #fff; border: 1px solid var(--border); }
        .nav-link:hover:not(.active) { color: #fff; background: rgba(255,255,255,0.05); }

        /* Content Area */
        .content { flex: 1; padding: 40px; display: flex; flex-direction: column; gap: 20px; max-width: 1100px; margin: 0 auto; width: 100%; }
        
        /* Dashboard Panels */
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 8px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        input { width: 100%; background: #080809; border: 1px solid var(--border); padding: 12px; border-radius: 4px; color: #fff; outline: none; box-sizing: border-box; font-family: 'Consolas', monospace; }
        input:focus { border-color: var(--accent); }

        .btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: 4px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn:hover { background: #6d28d9; }
        .btn-check { background: transparent; border: 1px solid var(--border); margin-top: 10px; color: var(--text); }
        .btn-check:hover { border-color: var(--accent); color: #fff; }

        /* Console */
        #console { background: #000000; border: 1px solid var(--border); border-radius: 8px; flex: 1; padding: 20px; font-family: 'Consolas', monospace; font-size: 0.85rem; overflow-y: auto; color: #d4d4d8; line-height: 1.5; }
        .log-item { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 3px; }
        .log-item span { color: var(--accent); margin-right: 10px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>DOOMHUB</h1>
        <div class="nav-link active">Server Cloner</div>
        <div class="nav-link">Token Checker</div>
        <div class="nav-link">System Logs</div>
        <div style="margin-top: auto; color: #3f3f46; font-size: 0.7rem; text-align: center;">VERSION 3.0 ELITE</div>
    </div>

    <div class="content">
        <div class="panel">
            <div class="input-group">
                <label>Discord Account Token</label>
                <input type="password" id="token" placeholder="Enter authorization token...">
                <button class="btn btn-check" onclick="checkToken()">Verify Authentication</button>
            </div>
            
            <div class="grid">
                <div class="input-group">
                    <label>Source Guild ID</label>
                    <input type="text" id="source" placeholder="Server ID to copy from">
                </div>
                <div class="input-group">
                    <label>Target Guild ID</label>
                    <input type="text" id="target" placeholder="Server ID to paste to">
                </div>
            </div>

            <button class="btn" onclick="start()">Execute Full Replication</button>
        </div>

        <div id="console"></div>
    </div>

    <script>
        async function checkToken() {
            const token = document.getElementById('token').value;
            const r = await fetch('/api/check', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token})});
            const d = await r.json();
            alert(d.valid ? "Token successfully verified." : "Authentication failed. Invalid token.");
        }

        function start() {
            fetch('/api/clone', {
                method:'POST', 
                headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({
                    token: document.getElementById('token').value,
                    source: document.getElementById('source').value,
                    target: document.getElementById('target').value
                })
            });
        }

        setInterval(async () => {
            const r = await fetch('/api/logs');
            const d = await r.json();
            const con = document.getElementById('console');
            con.innerHTML = d.logs.map(l => `<div class="log-item"><span>[SYSTEM]</span> ${l}</div>`).join('');
            con.scrollTop = con.scrollHeight;
        }, 800);
    </script>
</body>
</html>
