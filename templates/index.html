<!DOCTYPE html>
<html>
<head>
    <title>DOOMHUB SIMPLE</title>
    <style>
        body { background: #f5f5f7; color: #1d1d1f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #ffffff; padding: 40px; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); width: 400px; }
        h2 { margin-top: 0; font-weight: 600; text-align: center; color: #000; }
        label { display: block; margin: 15px 0 5px; font-size: 13px; color: #86868b; }
        input { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; background: #fbfbfd; }
        input:focus { border-color: #0071e3; }
        button { width: 100%; padding: 14px; margin-top: 25px; background: #0071e3; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; }
        button:hover { background: #0077ed; }
        #log-area { margin-top: 20px; font-size: 12px; color: #1d1d1f; border-top: 1px solid #f5f5f7; padding-top: 15px; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Doomhub Cloner</h2>
        
        <label>Account Token</label>
        <input type="password" id="token" placeholder="Paste your token">
        
        <label>Source Server ID</label>
        <input type="text" id="source" placeholder="ID to copy from">
        
        <label>Target Server ID</label>
        <input type="text" id="target" placeholder="ID to paste to">
        
        <button onclick="startClone()">Start Cloning</button>
        
        <div id="log-area">Status: Waiting for action...</div>
    </div>

    <script>
        function startClone() {
            document.getElementById('log-area').innerText = "Processing...";
            fetch('/api/clone', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    token: document.getElementById('token').value,
                    source: document.getElementById('source').value,
                    target: document.getElementById('target').value
                })
            });
        }

        setInterval(async () => {
            const r = await fetch('/api/logs');
            const d = await r.json();
            if (d.logs.length > 0) {
                document.getElementById('log-area').innerText = d.logs[d.logs.length - 1];
            }
        }, 1000);
    </script>
</body>
</html>
