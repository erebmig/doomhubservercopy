<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOMHUB SIMPLE</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --container-bg: #fbfbfd;
            --accent-color: #000000;
            --text-main: #1d1d1f;
            --text-dim: #86868b;
            --border-color: #d2d2d7;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; /* Footer için dikey hizalama */
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        /* --- Loading Screen --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            margin-top: 15px;
            font-size: 14px;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* --- Main UI --- */
        .container { 
            background: var(--container-bg); 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color);
            width: 380px; 
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s ease-out;
            z-index: 1;
        }

        .container.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        h2 { 
            margin-top: 0; 
            font-weight: 600; 
            text-align: center; 
            font-size: 22px;
            letter-spacing: -0.5px;
        }

        .input-group { margin-bottom: 15px; }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 12px; 
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-dim); 
        }

        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px; 
            outline: none; 
            background: #fff;
            transition: border 0.2s;
        }

        input:focus { border-color: var(--accent-color); }

        button { 
            width: 100%; 
            padding: 14px; 
            margin-top: 10px; 
            background: var(--accent-color); 
            color: #fff; 
            border: none; 
            border-radius: 6px; 
            font-size: 15px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }

        #log-area { 
            margin-top: 25px; 
            font-size: 12px; 
            color: var(--text-dim); 
            border-top: 1px solid var(--border-color); 
            padding-top: 15px; 
            min-height: 20px;
            text-align: center;
        }

        /* --- Footer Style --- */
        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 11px;
            color: var(--text-dim);
            opacity: 0;
            transition: opacity 1s ease-in 1s; /* Loader bittikten sonra yavaşça gelir */
        }

        footer.visible {
            opacity: 1;
        }

        .copyright {
            margin-top: 5px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">DOOMHUB</div>
    </div>

    <div class="container" id="main-content">
        <h2>Doomhub Cloner</h2>
        
        <div class="input-group">
            <label>Account Token</label>
            <input type="password" id="token" placeholder="••••••••••••••••">
        </div>
        
        <div class="input-group">
            <label>Source Server ID</label>
            <input type="text" id="source" placeholder="000000000000">
        </div>
        
        <div class="input-group">
            <label>Target Server ID</label>
            <input type="text" id="target" placeholder="000000000000">
        </div>
        
        <button onclick="startClone()">Start Process</button>
        
        <div id="log-area">Status: Ready</div>
    </div>

    <footer id="footer">
        <div>Made by <b>Doomhub</b> & <b>Tader</b></div>
        <div class="copyright">© 2026 Doomhub Cloner. All rights reserved.</div>
    </footer>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                const content = document.getElementById('main-content');
                const footer = document.getElementById('footer');
                
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                content.classList.add('loaded');
                footer.classList.add('visible');
            }, 1500);
        });

        function startClone() {
            const log = document.getElementById('log-area');
            log.innerText = "Connecting to API...";
            
            fetch('/api/clone', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    token: document.getElementById('token').value,
                    source: document.getElementById('source').value,
                    target: document.getElementById('target').value
                })
            }).catch(err => {
                log.innerText = "Error: Connection failed";
            });
        }

        setInterval(async () => {
            try {
                const r = await fetch('/api/logs');
                const d = await r.json();
                if (d.logs && d.logs.length > 0) {
                    document.getElementById('log-area').innerText = d.logs[d.logs.length - 1];
                }
            } catch(e) {}
        }, 2000);
    </script>
</body>
</html>
